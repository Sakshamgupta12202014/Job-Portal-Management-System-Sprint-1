version: '3.8'

services:
  auth-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: auth_db
    ports:
      - "3307:3306"
    volumes:
      - auth_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  job-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: job_db
    ports:
      - "3308:3306"
    volumes:
      - job_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  application-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: application_db
    ports:
      - "3309:3306"
    volumes:
      - app_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  admin-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: admin_db
    ports:
      - "3310:3306"
    volumes:
      - admin_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      retries: 5

  eureka-server:
    build: ./JPMS-EurekaServer
    ports:
      - "8761:8761"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 15s
      retries: 5

  auth-service:
    build: ./JPMS-AuthService
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-db:3306/auth_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: YourSuperSecretJWTKeyMustBeAtLeast256BitsLongForHS256Algorithm
    depends_on:
      auth-db: { condition: service_healthy }
      eureka-server: { condition: service_healthy }

  job-service:
    build: ./JPMS-JobService
    ports:
      - "8082:8082"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://job-db:3306/job_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      job-db: { condition: service_healthy }
      eureka-server: { condition: service_healthy }

  application-service:
    build: ./JPMS-ApplicationService
    ports:
      - "8083:8083"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://application-db:3306/application_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      application-db: { condition: service_healthy }
      job-service: { condition: service_started }
      eureka-server: { condition: service_healthy }

  admin-service:
    build: ./JPMS-AdminService
    ports:
      - "8084:8084"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://admin-db:3306/admin_db
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: root
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    depends_on:
      admin-db: { condition: service_healthy }
      auth-service: { condition: service_started }
      job-service: { condition: service_started }
      application-service: { condition: service_started }

  api-gateway:
    build: ./JPMS-ApiGateWay
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      JWT_SECRET: YourSuperSecretJWTKeyMustBeAtLeast256BitsLongForHS256Algorithm
    depends_on:
      eureka-server: { condition: service_healthy }
      auth-service: { condition: service_started }
      job-service: { condition: service_started }
      application-service: { condition: service_started }
      admin-service: { condition: service_started }

volumes:
  auth_data:
  job_data:
  app_data:
  admin_data:
