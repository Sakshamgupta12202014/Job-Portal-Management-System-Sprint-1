server:
  port: 8989   # All frontend requests come here

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    hostname: localhost

spring:
  application:
    name: API-GATEWAY

  cloud:
    gateway:
      routes:
        - id: auth-service
          uri: lb://AUTH-SERVICE           # SERVICE NAME, NOT PORT
          predicates:
            - Path=/api/auth/**
          filters:
            - GatewayJwtFilter

        - id: job-service
          uri: lb://JOB-SERVICE            # SERVICE NAME, NOT PORT
          predicates:
            - Path=/api/jobs/**
          filters:
            - GatewayJwtFilter

        - id: application-service
          uri: lb://APPLICATION-SERVICE    # SERVICE NAME, NOT PORT
          predicates:
            - Path=/api/applications/**
          filters:
            - GatewayJwtFilter

        - id: admin-service
          uri: lb://ADMIN-SERVICE          # SERVICE NAME, NOT PORT
          predicates:
            - Path=/api/admin/**
          filters:
            - GatewayJwtFilter

jwt:
  secret: jobportal_super_secret_key_must_be_at_least_32_characters_long

management:
  endpoints:
    web:
      exposure:
        include: health,info,routes
